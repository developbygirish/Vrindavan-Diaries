<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#3d0a18" />
<title>Vrindavan Diaries</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ====== reusable SVG art (mandala, toran, paisley, lotus) ====== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6d488" />
      <stop offset="50%" stop-color="#e7b75f" />
      <stop offset="100%" stop-color="#b8842f" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f9e6f" />
      <stop offset="100%" stop-color="#0c6b46" />
    </linearGradient>
    <radialGradient id="marigold" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#ffd089" />
      <stop offset="45%" stop-color="#f5972e" />
      <stop offset="100%" stop-color="#d2641a" />
    </radialGradient>

    <!-- one paisley corner ornament -->
    <symbol id="paisley" viewBox="0 0 120 120">
      <path d="M14 106 C14 50 50 14 100 16 C70 24 46 44 42 78 C40 96 54 104 70 98
               C58 110 30 112 14 106 Z" fill="url(#goldGrad)" opacity="0.95"/>
      <path d="M30 92 C34 60 56 38 86 34 C66 44 50 60 48 84 C47 96 38 96 30 92 Z"
            fill="#5a0f24" opacity="0.55"/>
      <circle cx="56" cy="74" r="5" fill="#fcefd8"/>
      <circle cx="70" cy="58" r="3.4" fill="#fcefd8"/>
      <circle cx="84" cy="44" r="2.4" fill="#fcefd8"/>
    </symbol>

    <!-- single marigold-and-leaf hanging unit for the toran -->
    <symbol id="toranUnit" viewBox="0 0 80 90">
      <line x1="40" y1="0" x2="40" y2="30" stroke="#0c6b46" stroke-width="2"/>
      <path d="M40 34 q-16 4 -18 22 q14 -2 18 -10 q4 8 18 10 q-2 -18 -18 -22 Z" fill="url(#leafGrad)"/>
      <g>
        <g id="petals">
          <ellipse cx="40" cy="40" rx="6" ry="10" fill="url(#marigold)"/>
        </g>
        <use href="#petals" transform="rotate(45 40 52)"/>
        <use href="#petals" transform="rotate(90 40 52)"/>
        <use href="#petals" transform="rotate(135 40 52)"/>
        <use href="#petals" transform="rotate(180 40 52)"/>
        <use href="#petals" transform="rotate(225 40 52)"/>
        <use href="#petals" transform="rotate(270 40 52)"/>
        <use href="#petals" transform="rotate(315 40 52)"/>
        <circle cx="40" cy="52" r="7" fill="#d2641a"/>
        <circle cx="40" cy="52" r="3" fill="#7a3b10"/>
      </g>
    </symbol>

    <!-- a small lotus for the divider -->
    <symbol id="lotus" viewBox="0 0 120 50">
      <g fill="url(#goldGrad)" stroke="#7a4a16" stroke-width="0.6">
        <path d="M60 46 C56 26 60 12 60 8 C60 12 64 26 60 46 Z"/>
        <path d="M60 46 C44 30 42 16 40 12 C50 18 58 30 60 46 Z"/>
        <path d="M60 46 C76 30 78 16 80 12 C70 18 62 30 60 46 Z"/>
        <path d="M60 46 C36 38 26 28 22 24 C40 28 54 38 60 46 Z"/>
        <path d="M60 46 C84 38 94 28 98 24 C80 28 66 38 60 46 Z"/>
      </g>
    </symbol>
  </defs>
</svg>

<!-- decorative mandala backdrop -->
<div class="mandala-bg" aria-hidden="true">
  <svg viewBox="0 0 600 600" width="600" height="600">
    <g id="mandala" fill="none" stroke="url(#goldGrad)" stroke-width="1.2">
      <circle cx="300" cy="300" r="290"/>
      <circle cx="300" cy="300" r="250" stroke-dasharray="3 7"/>
      <circle cx="300" cy="300" r="170"/>
      <circle cx="300" cy="300" r="90"/>
      <circle cx="300" cy="300" r="40"/>
      <g id="mPetalSet">
        <path d="M300 60 C330 130 330 170 300 210 C270 170 270 130 300 60 Z"/>
        <circle cx="300" cy="120" r="6" fill="url(#goldGrad)" stroke="none"/>
      </g>
      <use href="#mPetalSet" transform="rotate(30 300 300)"/>
      <use href="#mPetalSet" transform="rotate(60 300 300)"/>
      <use href="#mPetalSet" transform="rotate(90 300 300)"/>
      <use href="#mPetalSet" transform="rotate(120 300 300)"/>
      <use href="#mPetalSet" transform="rotate(150 300 300)"/>
      <use href="#mPetalSet" transform="rotate(180 300 300)"/>
      <use href="#mPetalSet" transform="rotate(210 300 300)"/>
      <use href="#mPetalSet" transform="rotate(240 300 300)"/>
      <use href="#mPetalSet" transform="rotate(270 300 300)"/>
      <use href="#mPetalSet" transform="rotate(300 300 300)"/>
      <use href="#mPetalSet" transform="rotate(330 300 300)"/>
    </g>
  </svg>
</div>

<!-- hanging toran across the top -->
<div class="toran" aria-hidden="true">
  <svg class="toran-rope" preserveAspectRatio="none" viewBox="0 0 80 90"></svg>
</div>

<header class="masthead">
  <p class="eyebrow">॥ a little travel album ॥</p>
  <h1 class="title">Vrindavan&nbsp;Diaries</h1>
  <div class="divider"><svg viewBox="0 0 120 50" width="110" height="42"><use href="#lotus"/></svg></div>
</header>

<main class="viewer">
  <button class="nav nav-prev" id="prevBtn" aria-label="Previous photo">
    <svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>

  <div class="stage" id="stage">
    <div class="card" id="card">
      <span class="corner tl"><svg viewBox="0 0 120 120"><use href="#paisley"/></svg></span>
      <span class="corner tr"><svg viewBox="0 0 120 120"><use href="#paisley"/></svg></span>
      <span class="corner bl"><svg viewBox="0 0 120 120"><use href="#paisley"/></svg></span>
      <span class="corner br"><svg viewBox="0 0 120 120"><use href="#paisley"/></svg></span>

      <div class="photo-wrap" id="photoWrap">
        <img class="photo" id="photo" alt="Vrindavan trip photo" draggable="false" />
        <button class="like-badge" id="likeBadge" aria-label="Like this photo" aria-pressed="false">
          <svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.7-10-9.2C.6 9 1.6 5.4 5 4.3 7.2 3.6 9.4 4.5 12 7c2.6-2.5 4.8-3.4 7-2.7 3.4 1.1 4.4 4.7 3 7.5C19.5 16.3 12 21 12 21z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

  <button class="nav nav-next" id="nextBtn" aria-label="Next photo">
    <svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</main>

<div class="controls">
  <div class="counter"><span id="curNum">1</span><span class="slash">/</span><span id="totalNum">29</span></div>
  <div class="progress"><span class="progress-fill" id="progressFill"></span></div>
  <div class="likes-tally" id="likesTally">
    <svg viewBox="0 0 24 24"><path d="M12 21s-7.5-4.7-10-9.2C.6 9 1.6 5.4 5 4.3 7.2 3.6 9.4 4.5 12 7c2.6-2.5 4.8-3.4 7-2.7 3.4 1.1 4.4 4.7 3 7.5C19.5 16.3 12 21 12 21z" fill="currentColor"/></svg>
    <span id="likesCount">0</span> loved
  </div>
</div>

<p class="hint" id="hint">swipe ‹ › to explore · double-tap a photo to ♥</p>

<footer class="footer">made with <span class="heartlet">♥</span> · Vrindavan</footer>

<script src="app.js"></script>
</body>
</html>
